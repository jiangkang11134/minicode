<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCode Web UI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; background: #1a1a2e; color: #e0e0e0; }

  /* 布局 */
  .sidebar { width: 260px; background: #16213e; border-right: 1px solid #2a2a4a; display: flex; flex-direction: column; }
  .main { flex: 1; display: flex; flex-direction: column; }
  .file-panel { width: 280px; background: #16213e; border-left: 1px solid #2a2a4a; display: flex; flex-direction: column; }

  /* 头部 */
  .header { padding: 12px 16px; background: #0f3460; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .config-bar { padding: 8px 16px; background: #1a1a3e; display: flex; gap: 8px; align-items: center; font-size: 13px; }
  .config-bar select, .config-bar input { background: #0f3460; color: #e0e0e0; border: 1px solid #2a2a4a; padding: 4px 8px; border-radius: 4px; font-size: 12px; }

  /* 聊天 */
  .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
  .msg.user { background: #0f3460; align-self: flex-end; }
  .msg.assistant { background: #1a1a3e; align-self: flex-start; }
  .msg.status { background: #2a2a2a; align-self: center; font-size: 12px; color: #888; }
  .msg.error { background: #3e1a1a; align-self: center; }

  /* 输入 */
  .input-area { padding: 12px 16px; background: #16213e; border-top: 1px solid #2a2a4a; display: flex; gap: 8px; }
  .input-area textarea { flex: 1; background: #0f3460; color: #e0e0e0; border: 1px solid #2a2a4a; border-radius: 8px; padding: 10px; font-size: 14px; resize: none; min-height: 44px; max-height: 120px; }
  .input-area textarea:focus { outline: none; border-color: #4a9eff; }
  .input-area button { background: #4a9eff; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 14px; }
  .input-area button:hover { background: #3a8eef; }
  .input-area button:disabled { background: #2a5a8e; cursor: not-allowed; }

  /* 文件面板 */
  .file-header { padding: 10px 12px; font-size: 13px; font-weight: 600; background: #0f3460; }
  .file-list { flex: 1; overflow-y: auto; padding: 4px; }
  .file-item { padding: 6px 10px; cursor: pointer; font-size: 13px; border-radius: 4px; display: flex; align-items: center; gap: 6px; }
  .file-item:hover { background: #2a2a4a; }
  .file-item .icon { font-size: 14px; }
  .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .size { font-size: 11px; color: #666; }

  .file-content { flex: 1; overflow: auto; padding: 12px; }
  .file-content pre { background: #0a0a1e; padding: 12px; border-radius: 8px; font-size: 13px; overflow: auto; }

  /* 拖拽上传 */
  .drop-zone { border: 2px dashed #2a2a4a; border-radius: 8px; padding: 20px; text-align: center; margin: 8px; font-size: 13px; color: #666; cursor: pointer; }
  .drop-zone:hover { border-color: #4a9eff; color: #4a9eff; }
  .drop-zone.dragover { border-color: #4a9eff; background: #1a1a4e; }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }

  /* 加载动画 */
  .typing { display: inline-flex; gap: 4px; padding: 4px 0; }
  .typing span { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: pulse 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
</style>
</head>
<body>

<!-- 侧边栏 -->
<div class="sidebar">
  <div class="header"><h1>⚡ SmartCode</h1></div>
  <div class="config-bar">
    <select id="modeSelect">
      <option value="off">off（无审查）</option>
      <option value="loose">loose（宽松）</option>
      <option value="strict" selected>strict（严格）</option>
    </select>
    <input id="modelInput" placeholder="模型名" value="deepseek-v4-flash" style="flex:1">
  </div>
  <div class="chat-area" id="chatArea">
    <div class="msg assistant">👋 你好！我是 SmartCode。我可以帮你写代码、分析项目、审查代码安全。</div>
  </div>
  <div class="input-area">
    <textarea id="msgInput" placeholder="输入消息..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<!-- 主面板（文件浏览） -->
<div class="main">
  <div class="header" style="justify-content:space-between">
    <span>📁 文件浏览器 · <span id="currentPath" style="color:#4a9eff">.</span></span>
    <span style="font-size:12px; color:#888" id="statusText">就绪</span>
  </div>
  <div class="file-content" id="fileContent">
    <div class="file-list" id="fileList"></div>
  </div>
</div>

<!-- 文件面板 -->
<div class="file-panel">
  <div class="file-header">📄 文件预览</div>
  <div class="drop-zone" id="dropZone" ondragover="event.preventDefault();this.classList.add('dragover')"
       ondragleave="this.classList.remove('dragover')" ondrop="handleDrop(event)">
    📂 拖拽文件到此处上传
  </div>
  <div class="file-content" id="previewContent">
    <pre style="color:#666">选择左侧文件查看内容</pre>
  </div>
</div>

<script>
// ── 文件浏览器 ──
let currentPath = ".";

async function loadFiles(path) {
  currentPath = path;
  document.getElementById("currentPath").textContent = path;
  const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
  const data = await res.json();
  if (data.error) return;

  const list = document.getElementById("fileList");
  list.innerHTML = "";

  // 上级目录
  if (data.parent) {
    const item = document.createElement("div");
    item.className = "file-item";
    item.innerHTML = '<span class="icon">📂</span><span class="name">..</span>';
    item.onclick = () => loadFiles(data.parent);
    list.appendChild(item);
  }

  for (const item of data.items) {
    const el = document.createElement("div");
    el.className = "file-item";
    const icon = item.type === "dir" ? "📁" : "📄";
    const size = item.type === "file" ? ` <span class="size">${formatSize(item.size)}</span>` : "";
    el.innerHTML = `<span class="icon">${icon}</span><span class="name">${item.name}</span>${size}`;

    if (item.type === "dir") {
      el.onclick = () => loadFiles(item.path);
    } else if (item.name.endsWith(".py") || item.name.endsWith(".md") || item.name.endsWith(".txt") || item.name.endsWith(".json")) {
      el.onclick = () => previewFile(item.path);
    }
    list.appendChild(el);
  }
}

async function previewFile(path) {
  const res = await fetch(`/api/file?path=${encodeURIComponent(path)}`);
  const data = await res.json();
  if (data.error) return;
  document.getElementById("previewContent").innerHTML = `<pre>${escapeHtml(data.content)}</pre>`;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
  return (bytes/1024/1024).toFixed(1) + " MB";
}

function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ── 拖拽上传 ──
async function handleDrop(event) {
  event.preventDefault();
  document.getElementById("dropZone").classList.remove("dragover");
  const files = event.dataTransfer.files;
  for (const file of files) {
    const formData = new FormData();
    formData.append("file", file);
    await fetch("/api/upload", { method: "POST", body: formData });
    loadFiles(currentPath);
  }
}

// ── WebSocket 聊天 ──
const chatArea = document.getElementById("chatArea");
const msgInput = document.getElementById("msgInput");
const sendBtn = document.getElementById("sendBtn");
const modeSelect = document.getElementById("modeSelect");
const modelInput = document.getElementById("modelInput");
const statusText = document.getElementById("statusText");

msgInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function addMessage(role, content) {
  const msg = document.createElement("div");
  msg.className = `msg ${role}`;
  msg.textContent = content;
  chatArea.appendChild(msg);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  const el = document.createElement("div");
  el.className = "msg status";
  el.id = "typingIndicator";
  el.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  chatArea.appendChild(el);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById("typingIndicator");
  if (el) el.remove();
}

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;

  msgInput.value = "";
  addMessage("user", text);
  showTyping();
  sendBtn.disabled = true;
  statusText.textContent = "运行中...";

  try {
    const ws = new WebSocket(`ws://${location.host}/ws/chat`);
    ws.onopen = () => {
      ws.send(JSON.stringify({
        message: text,
        mode: modeSelect.value,
        model: modelInput.value,
      }));
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      hideTyping();

      if (data.type === "status") {
        addMessage("status", data.content);
        showTyping();
      } else if (data.type === "result") {
        hideTyping();
        addMessage("assistant", data.content || "(无回复)");
        if (data.files && data.files.length > 0) {
          addMessage("status", "📄 生成的文件: " + data.files.join(", "));
          loadFiles(".");
        }
      } else if (data.type === "error") {
        hideTyping();
        addMessage("error", "❌ " + data.content);
      }
    };

    ws.onclose = () => {
      hideTyping();
      sendBtn.disabled = false;
      statusText.textContent = "就绪";
    };

    ws.onerror = () => {
      hideTyping();
      addMessage("error", "❌ WebSocket 连接失败");
      sendBtn.disabled = false;
      statusText.textContent = "连接失败";
    };
  } catch (e) {
    hideTyping();
    addMessage("error", "❌ " + e.message);
    sendBtn.disabled = false;
  }
}

// ── 初始化 ──
loadFiles(".");
</script>
</body>
</html>
