<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCode</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; background: #0d1117; color: #c9d1d9; }

  /* ── 左侧：聊天 ── */
  .chat-panel { width: 360px; min-width: 300px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
  .chat-header { padding: 10px 14px; font-size: 13px; font-weight: 600; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 8px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .chat-msg { font-size: 13px; line-height: 1.5; padding: 8px 12px; border-radius: 6px; max-width: 95%; white-space: pre-wrap; word-break: break-word; }
  .chat-msg.user { background: #1f6feb33; color: #7ee787; align-self: flex-end; }
  .chat-msg.assistant { background: #1c2333; color: #c9d1d9; align-self: flex-start; }
  .chat-msg.system { background: transparent; color: #8b949e; font-size: 12px; align-self: center; }
  .chat-msg.error { background: #f8514933; color: #f85149; align-self: center; }
  .chat-input { padding: 10px 12px; border-top: 1px solid #30363d; display: flex; gap: 8px; }
  .chat-input textarea { flex: 1; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: inherit; resize: none; min-height: 40px; max-height: 100px; outline: none; }
  .chat-input textarea:focus { border-color: #58a6ff; }
  .chat-input button { background: #238636; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 13px; white-space: nowrap; }
  .chat-input button:hover { background: #2ea043; }
  .chat-input button:disabled { background: #23863655; cursor: not-allowed; }

  /* ── 中间：代码编辑器 ── */
  .editor-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .editor-tabs { display: flex; background: #161b22; border-bottom: 1px solid #30363d; overflow-x: auto; }
  .editor-tab { padding: 8px 14px; font-size: 12px; cursor: pointer; border-right: 1px solid #30363d; color: #8b949e; white-space: nowrap; }
  .editor-tab.active { background: #0d1117; color: #c9d1d9; border-bottom: 2px solid #58a6ff; }
  .editor-tab:hover { color: #c9d1d9; }
  .editor-body { flex: 1; display: flex; flex-direction: column; position: relative; }
  .editor-body textarea { flex: 1; background: #0d1117; color: #c9d1d9; border: none; padding: 12px; font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; tab-size: 4; }
  .editor-body textarea::placeholder { color: #484f58; }
  .editor-toolbar { display: flex; gap: 6px; padding: 6px 12px; background: #161b22; border-top: 1px solid #30363d; }
  .editor-toolbar button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
  .editor-toolbar button:hover { background: #30363d; }
  .editor-toolbar button.primary { background: #238636; border-color: #238636; }
  .editor-toolbar button.primary:hover { background: #2ea043; }
  .editor-status { padding: 4px 12px; font-size: 11px; color: #484f58; background: #161b22; border-top: 1px solid #30363d; display: flex; justify-content: space-between; }

  /* ── 右侧：文件浏览器 + 设置 ── */
  .side-panel { width: 260px; min-width: 220px; background: #161b22; border-left: 1px solid #30363d; display: flex; flex-direction: column; }
  .side-section { border-bottom: 1px solid #30363d; }
  .side-header { padding: 8px 12px; font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; background: #161b22; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
  .side-header:hover { color: #c9d1d9; }
  .side-content { padding: 8px; }
  .side-content.hidden { display: none; }
  .side-content label { font-size: 11px; color: #8b949e; display: block; margin: 6px 0 3px; }
  .side-content input, .side-content select { width: 100%; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; border-radius: 4px; padding: 5px 8px; font-size: 12px; margin-bottom: 4px; font-family: inherit; }
  .side-content input:focus, .side-content select:focus { outline: none; border-color: #58a6ff; }

  .file-list { max-height: 300px; overflow-y: auto; font-size: 13px; }
  .file-item { padding: 4px 8px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 6px; }
  .file-item:hover { background: #1c2333; }
  .file-item.selected { background: #1f6feb33; color: #58a6ff; }

  .drop-zone { border: 1px dashed #30363d; border-radius: 4px; padding: 10px; text-align: center; font-size: 11px; color: #484f58; cursor: pointer; margin: 4px; }
  .drop-zone:hover { border-color: #58a6ff; color: #58a6ff; }
  .drop-zone.dragover { border-color: #58a6ff; background: #1c2333; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>

<!-- 聊天 -->
<div class="chat-panel">
  <div class="chat-header">💬 SmartCode</div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-msg system">在右侧面板填入 API Key 后开始编码，支持 /help 查看命令。</div>
  </div>
  <div class="chat-input">
    <textarea id="chatInput" rows="1" placeholder="输入消息..." style="height:40px"></textarea>
    <button id="sendBtn" onclick="sendMsg()">发送</button>
  </div>
</div>

<!-- 编辑器 -->
<div class="editor-panel">
  <div class="editor-tabs" id="editorTabs">
    <div class="editor-tab active">📄 新文件</div>
  </div>
  <div class="editor-body">
    <textarea id="editor" placeholder="在此编辑代码，保存后会写入项目文件。"></textarea>
    <div class="editor-toolbar">
      <button onclick="saveFile()">💾 保存</button>
      <button class="primary" onclick="runCode()">▶ 运行</button>
      <button onclick="formatCode()">🎨 格式化</button>
      <span style="flex:1"></span>
      <button onclick="openInTerminal()">打开终端</button>
    </div>
    <div class="editor-status">
      <span id="fileStatus">未保存</span>
      <span id="cursorPos">行 1, 列 1</span>
    </div>
  </div>
</div>

<!-- 右侧 -->
<div class="side-panel">
  <div class="side-section">
    <div class="side-header" onclick="toggleSection('settingsBody')">⚙ 设置</div>
    <div class="side-content" id="settingsBody">
      <label>模型</label>
      <input id="modelInput" value="deepseek-v4-flash">
      <label>API Base URL</label>
      <input id="baseUrlInput" value="https://dashscope.aliyuncs.com/compatible-mode/v1">
      <label>API Key</label>
      <input id="apiKeyInput" type="password" placeholder="sk-...">
      <label>审查模式</label>
      <select id="modeSelect">
        <option value="off">off — 不审查</option>
        <option value="loose">loose — 宽松</option>
        <option value="strict" selected>strict — 严格</option>
      </select>
    </div>
  </div>
  <div class="side-section" style="flex:1;display:flex;flex-direction:column;min-height:0;">
    <div class="side-header" onclick="toggleSection('filesBody')" style="cursor:default">📁 文件</div>
    <div class="side-content" id="filesBody" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="file-list" id="fileList" style="flex:1;max-height:none;"></div>
      <div class="drop-zone" id="dropZone">📂 拖拽文件到此处上传</div>
    </div>
  </div>
</div>

<script>
let currentFilePath = null;
let currentPath = ".";

// ── 文件浏览 ──
async function loadFiles(path) {
  currentPath = path;
  const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
  const data = await res.json();
  if (data.error) return;
  const list = document.getElementById("fileList");
  list.innerHTML = "";
  if (data.parent) {
    const el = document.createElement("div"); el.className = "file-item";
    el.innerHTML = '<span>📁</span><span>..</span>';
    el.onclick = () => loadFiles(data.parent);
    list.appendChild(el);
  }
  for (const item of data.items) {
    const el = document.createElement("div"); el.className = "file-item";
    const icon = item.type === "dir" ? "📁" : "📄";
    el.innerHTML = `<span>${icon}</span><span>${item.name}</span>`;
    if (item.type === "dir") el.onclick = () => loadFiles(item.path);
    else if (item.name.match(/\.(py|md|txt|json|yaml|yml|toml|js|ts|html|css|java|go|rs|c|cpp|h)$/)) {
      el.onclick = () => openFile(item.path);
    }
    list.appendChild(el);
  }
}

async function openFile(path) {
  currentFilePath = path;
  const res = await fetch(`/api/file?path=${encodeURIComponent(path)}`);
  const data = await res.json();
  if (data.error) return;
  document.getElementById("editor").value = data.content;
  document.getElementById("fileStatus").textContent = `📄 ${path}`;
  document.querySelectorAll(".file-item").forEach(e => e.classList.remove("selected"));
  document.querySelector(`.file-item:last-child`)?.classList.add("selected");
}

async function saveFile() {
  const content = document.getElementById("editor").value;
  if (!currentFilePath) {
    const name = prompt("文件名（如 test.py）：");
    if (!name) return;
    currentFilePath = name;
  }
  const res = await fetch("/api/save", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({path: currentFilePath, content}),
  });
  const data = await res.json();
  if (data.ok) {
    document.getElementById("fileStatus").textContent = `✅ saved ${currentFilePath}`;
    loadFiles(currentPath);
  } else {
    alert("保存失败: " + (data.error || "未知错误"));
  }
}

function formatCode() {
  alert("代码格式化功能待实现");
}

function runCode() {
  const content = document.getElementById("editor").value;
  addChatMsg("system", "代码运行功能在终端中可用");
}

function openInTerminal() {
  document.getElementById("chatInput").value = `查看 ${currentFilePath || "当前文件"}`;
  document.getElementById("chatInput").focus();
}

// ── 聊天 ──
const chatMessages = document.getElementById("chatMessages");
const chatInput = document.getElementById("chatInput");

chatInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

function addChatMsg(role, text) {
  const msg = document.createElement("div");
  msg.className = `chat-msg ${role}`;
  msg.textContent = text;
  chatMessages.appendChild(msg);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function sendMsg() {
  const text = chatInput.value.trim();
  if (!text) return;
  chatInput.value = "";
  addChatMsg("user", text);

  const sendBtn = document.getElementById("sendBtn");
  sendBtn.disabled = true;

  const ws = new WebSocket(`ws://${location.host}/ws/chat`);
  ws.onopen = () => {
    ws.send(JSON.stringify({
      message: text,
      mode: document.getElementById("modeSelect").value,
      model: document.getElementById("modelInput").value,
      api_key: document.getElementById("apiKeyInput").value,
      base_url: document.getElementById("baseUrlInput").value,
    }));
  };
  ws.onmessage = event => {
    const data = JSON.parse(event.data);
    if (data.type === "result") {
      addChatMsg("assistant", data.content || "(无回复)");
      if (data.files?.length) {
        addChatMsg("system", "📄 生成: " + data.files.join(", "));
        loadFiles(".");
      }
    } else if (data.type === "status") {
      addChatMsg("system", "▸ " + data.content);
    } else if (data.type === "error") {
      addChatMsg("error", "✗ " + data.content);
    }
  };
  ws.onclose = () => { sendBtn.disabled = false; };
  ws.onerror = () => { addChatMsg("error", "✗ 连接失败"); sendBtn.disabled = false; };
}

// ── 拖拽上传 ──
document.getElementById("dropZone").ondragover = e => { e.preventDefault(); e.target.classList.add("dragover"); };
document.getElementById("dropZone").ondragleave = e => { e.target.classList.remove("dragover"); };
document.getElementById("dropZone").ondrop = async (e) => {
  e.preventDefault(); e.target.classList.remove("dragover");
  for (const file of e.dataTransfer.files) {
    const fd = new FormData(); fd.append("file", file);
    await fetch("/api/upload", { method: "POST", body: fd });
  }
  loadFiles(".");
};

function toggleSection(id) {
  const el = document.getElementById(id);
  el.classList.toggle("hidden");
}

// ── 编辑器状态行 ──
document.getElementById("editor").addEventListener("input", () => {
  document.getElementById("fileStatus").textContent = currentFilePath ? `📝 ${currentFilePath} (未保存)` : "未保存";
});
document.getElementById("editor").addEventListener("keyup", (e) => {
  const text = e.target.value.substring(0, e.target.selectionStart);
  const lines = text.split("\n");
  document.getElementById("cursorPos").textContent = `行 ${lines.length}, 列 ${lines[lines.length-1].length + 1}`;
});

loadFiles(".");
</script>
</body>
</html>
